{% extends "base.html" %}
{% block title %}Edit Student — StudentOS{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-header">
    <a href="{{ url_for('index') }}" class="back-link">← Back</a>
    <h1 class="page-title">Edit Student</h1>
    <p class="page-subtitle">Update the details for <strong>{{ student['name'] }}</strong>.</p>
  </div>

  <form method="POST" action="{{ url_for('edit', student_id=student['id']) }}" class="student-form" novalidate>

    <div class="form-grid">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" value="{{ student['name'] }}" required />
      </div>

      <div class="form-group">
        <label for="roll_no">Roll Number</label>
        <input type="text" id="roll_no" name="roll_no" value="{{ student['roll_no'] }}" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" value="{{ student['email'] }}" required />
      </div>

      <div class="form-group">
        <label for="grade">Grade / Class</label>
        <input type="text" id="grade" name="grade" value="{{ student['grade'] }}" required />
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" value="{{ student['phone'] }}" required />
      </div>

      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" value="{{ student['dob'] }}" required />
      </div>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('index') }}" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary">Save Changes →</button>
    </div>

  </form>
</div>
{% endblock %}
