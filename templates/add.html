{% extends "base.html" %}
{% block title %}Add Student — StudentOS{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-header">
    <a href="{{ url_for('index') }}" class="back-link">← Back</a>
    <h1 class="page-title">Add New Student</h1>
    <p class="page-subtitle">Fill in the details below to enroll a student.</p>
  </div>

  <form method="POST" action="{{ url_for('add') }}" class="student-form" novalidate>

    <div class="form-grid">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Ali Hassan" required />
      </div>

      <div class="form-group">
        <label for="roll_no">Roll Number</label>
        <input type="text" id="roll_no" name="roll_no" placeholder="e.g. CS-2024-001" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="e.g. ali@school.edu" required />
      </div>

      <div class="form-group">
        <label for="grade">Grade / Class</label>
        <input type="text" id="grade" name="grade" placeholder="e.g. 10th, BS-CS Year 2" required />
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="e.g. 0300-1234567" required />
      </div>

      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" required />
      </div>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('index') }}" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary">Add Student →</button>
    </div>

  </form>
</div>
{% endblock %}
